name: Fly.io Worker Deployment

on:
  push:
    branches:
      - main
    paths:
      - apps/worker-py/**
  workflow_run:
    workflows: ["Release Gate (MVP SC-001..SC-013)"]
    types:
      - completed

concurrency:
  group: fly-worker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy worker-py to Fly.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    if: >
      (github.event_name == 'push' && (contains(toJson(github.event.commits.*.added), 'apps/worker-py') || contains(toJson(github.event.commits.*.modified), 'apps/worker-py'))) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          cd apps/worker-py
          flyctl auth deploy --flycast-token=$FLY_API_TOKEN
          flyctl deploy --remote-only --strategy=rolling

  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy]
    permissions:
      contents: read
      deployments: write
    if: always() && needs.deploy.result == 'success'
    steps:
      - name: Create deployment
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: 'Production deploy',
            });
