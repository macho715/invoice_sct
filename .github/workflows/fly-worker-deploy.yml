name: Fly.io Worker Deployment

on:
  push:
    branches:
      - main
    paths:
      - apps/worker-py/**
  workflow_run:
    workflows: ["Release Gate (MVP SC-001..SC-013)"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: fly-worker-${{ github.ref }}
  cancel-in-progress: false

env:
  # P2 — opt into Node 24 runner ahead of 2026-06-16 default
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Deploy worker-py to Fly.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    # Prevent double-deploy: only fire on push to main, not workflow_run
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          cd apps/worker-py
          flyctl deploy --remote-only --strategy=rolling
          # flyctl reads FLY_API_TOKEN from env automatically — no separate auth step needed.

  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy]
    permissions:
      contents: read
      deployments: write
    if: always() && needs.deploy.result == 'success'
    steps:
      - name: Create deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: 'Production deploy',
            });
