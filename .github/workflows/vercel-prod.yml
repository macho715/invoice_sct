name: Vercel Production Deployment

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["Release Gate (MVP SC-001..SC-013)"]
    types:
      - completed

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  # P2 — opt into Node 24 runner ahead of 2026-06-16 default
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: vercel-prod-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    # Prevent double-deploy: only fire on push to main, not workflow_run
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v3
        with:
          path: |
            ~/.pnpm-store
            **/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment Information
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production

      - name: Build Project Artifacts
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod

      - name: Deploy Project Artifacts to Vercel (production)
        id: vercel_deploy
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "production_url=$DEPLOY_URL" >> $GITHUB_OUTPUT

  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy]
    permissions:
      contents: read
      deployments: write
    if: always() && needs.deploy.result == 'success'
    steps:
      - name: Create deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: 'Production deploy',
            });
