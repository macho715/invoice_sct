name: Vercel Production Deployment

on:
  push:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  # P2 — opt into Node 24 runner ahead of 2026-06-16 default
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: vercel-prod-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    outputs:
      deploy_url: ${{ steps.vercel_deploy.outputs.deploy_url }}
    permissions:
      contents: read
      deployments: write
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check Vercel deployment secrets
        id: vercel_secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel deployment secrets are not fully configured; skipping GitHub Actions deploy."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.vercel_secrets.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        if: steps.vercel_secrets.outputs.available == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        if: steps.vercel_secrets.outputs.available == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Vercel CLI
        if: steps.vercel_secrets.outputs.available == 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment Information
        if: steps.vercel_secrets.outputs.available == 'true'
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production

      - name: Build Project Artifacts
        if: steps.vercel_secrets.outputs.available == 'true'
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod

      - name: Deploy Project Artifacts to Vercel (production)
        if: steps.vercel_secrets.outputs.available == 'true'
        id: vercel_deploy
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "production_url=$DEPLOY_URL" >> $GITHUB_OUTPUT

  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy]
    permissions:
      contents: read
      deployments: write
    if: always() && needs.deploy.result == 'success' && needs.deploy.outputs.deploy_url != ''
    steps:
      - name: Create deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: 'Production deploy',
            });
