name: Fly.io MCP Server Deployment

on:
  push:
    branches:
      - main
    paths:
      - apps/mcp-server/**
  workflow_dispatch:

concurrency:
  group: fly-mcp-server-${{ github.ref }}
  cancel-in-progress: false

env:
  # P2 — opt into Node 24 runner ahead of 2026-06-16 default
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Deploy mcp-server to Fly.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          cd apps/mcp-server
          flyctl deploy --remote-only --strategy=rolling
          # flyctl reads FLY_API_TOKEN from env automatically.
          # NOTE: the Fly app 'hvdc-mcp-server' must already exist
          # (run `flyctl apps create hvdc-mcp-server` once before the first deploy).
