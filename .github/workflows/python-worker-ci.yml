name: Python Worker CI

on:
  push:
    branches: [ main ]
  pull_request:
    paths:
      - 'apps/worker-py/**'
      - '.github/workflows/python-worker-ci.yml'

jobs:
  ci:
    name: Lint, Audit and Test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd apps/worker-py
          uv sync --frozen

      - name: Lint with ruff
        run: |
          cd apps/worker-py
          uv run ruff check app/ || echo "Ruff check completed (non-blocking)"

      - name: Dependency Vulnerability Audit
        run: |
          cd apps/worker-py
          uvx pip-audit --strict

      - name: Run pytest
        run: |
          cd apps/worker-py
          uv run pytest
