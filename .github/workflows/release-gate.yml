name: "Release Gate (MVP SC-001..SC-013)"

# Integrated release gate for MVP. Runs ALL success criteria from the Spec.
# Collapsed to 4 job groups to reduce CI bottleneck.
#
# NOTE: Track 1 DLP scan + self-test scripts live in shpiment/ which is a
# sibling of SCT_ONTOLOGY-main/ in the parent invoice/ repo. Those checks
# run in a separate parent workflow. The sc-dlp job here guards gracefully
# and skips when the scripts are not present in this repo.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:
    types: [labeled, opened, synchronize, reopened]

concurrency:
  group: release-gate
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  # P2 — opt into Node 24 runner ahead of 2026-06-16 default
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ------------------------------------------------------------------
  # SC-001..SC-003: DLP scan + Track 1 self-test
  # ------------------------------------------------------------------
  sc-dlp:
    name: "SC-DLP (DLP scan + self-test 3x)"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'release-gate')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: DLP scan (deferred — run in parent invoice/ workflow)
        run: |
          echo "::notice::Track 1 DLP/self-test runs in the parent invoice/ workflow. SC-DLP gate passes here."

  # ------------------------------------------------------------------
  # SC-Python-CI: workbook contract + pytest + worker startup smoke
  # Consolidates: sc-workbook, sc-pytest, sc-worker-startup
  # ------------------------------------------------------------------
  sc-python-ci:
    name: "SC-Python-CI (workbook + pytest + startup)"
    runs-on: ubuntu-latest
    needs: [sc-dlp]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'release-gate')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install worker-py dependencies
        run: |
          cd apps/worker-py
          uv sync --frozen

      - name: Build fixture
        run: |
          cd apps/worker-py
          uv run python make_fixture.py

      - name: Validate workbook (13 sheets, exact order)
        run: |
          FIXTURE=$(ls apps/worker-py/tests/fixtures/*.xlsx 2>/dev/null | head -n 1)
          if [ -z "$FIXTURE" ]; then
            echo "::error::No fixture xlsx found under apps/worker-py/tests/fixtures/"
            exit 1
          fi
          python apps/worker-py/scripts/workbook_contract_validate.py "$FIXTURE"

      - name: Assert 03_Type_B_Summary NOT in output
        run: |
          FIXTURE=$(ls apps/worker-py/tests/fixtures/*.xlsx 2>/dev/null | head -n 1)
          python - "$FIXTURE" <<'PY'
          import sys
          import openpyxl

          wb = openpyxl.load_workbook(sys.argv[1], data_only=True)
          forbidden = '03_Type_B_Summary'
          if forbidden in wb.sheetnames:
              print(f'::error::Forbidden sheet present: {forbidden}')
              raise SystemExit(1)
          print('OK: 03_Type_B_Summary is absent')
          PY

      - name: Run pytest (coverage >= 80%)
        run: |
          cd apps/worker-py
          uv run pytest -q --maxfail=1 --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Import smoke (parsers + routes)
        run: |
          cd apps/worker-py
          uv run python -c "from app.parsers import parse, pdf_text, pdf_json; from app.routes import parse as r"
          echo "Exit: $?"

  # ------------------------------------------------------------------
  # SC-TS-Checks: typecheck + lint + test for web & mcp-server
  # Consolidates: sc-vitest, sc-typecheck, sc-mcp-cardinality,
  #               sc-mcp-test, sc-web-lint
  # ------------------------------------------------------------------
  sc-ts-checks:
    name: "SC-TS-Checks (typecheck + lint + test - web & mcp)"
    runs-on: ubuntu-latest
    needs: [sc-dlp]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'release-gate')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      # --- apps/web (pnpm) ---
      - name: Install apps/web dependencies
        run: |
          cd apps/web
          pnpm install --frozen-lockfile

      - name: Typecheck apps/web
        run: |
          cd apps/web
          pnpm typecheck

      - name: Lint apps/web
        run: |
          cd apps/web
          pnpm lint

      - name: Vitest apps/web (coverage >= 80%)
        run: |
          cd apps/web
          pnpm run test -- --run --coverage --coverage.thresholds.lines=80 --coverage.thresholds.functions=80 --coverage.thresholds.branches=80 --coverage.thresholds.statements=80

      # --- apps/mcp-server (pnpm) ---
      - name: Install mcp-server dependencies
        run: |
          cd apps/mcp-server
          pnpm install --frozen-lockfile

      - name: Typecheck apps/mcp-server
        run: |
          cd apps/mcp-server
          pnpm run typecheck

      - name: Run mcp-server tests
        run: |
          cd apps/mcp-server
          pnpm test

      # --- MCP tool cardinality ---
      - name: Count MCP tools
        run: |
          TOOLS_DIR="apps/mcp-server/src/tools"
          if [ ! -d "$TOOLS_DIR" ]; then
            echo "::error::MCP tools directory not found: $TOOLS_DIR"
            exit 1
          fi
          COUNT=$(find "$TOOLS_DIR" -maxdepth 1 -type f -name "*.ts" ! -name "index.ts" | wc -l)
          echo "MCP tools files found: $COUNT"
          if [ "$COUNT" -ne 14 ]; then
            echo "::error::Expected 14 MCP tools, found $COUNT"
            exit 1
          fi
          echo "OK: 14 MCP tools present"

  # ------------------------------------------------------------------
  # SC-013: E2E Playwright smoke tests
  # ------------------------------------------------------------------
  sc-e2e:
    name: "SC-E2E (Playwright smoke, blocking)"
    runs-on: ubuntu-latest
    needs: [sc-dlp]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'release-gate')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: |
          cd apps/web
          pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: |
          cd apps/web
          pnpm exec playwright install --with-deps

      - name: Run E2E smoke tests
        run: |
          cd apps/web
          pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ------------------------------------------------------------------
  # gate-summary: aggregate 4 groups; emit PASS/FAIL badge
  # ------------------------------------------------------------------
  gate-summary:
    name: "Gate-Summary (PASS/FAIL)"
    runs-on: ubuntu-latest
    needs:
      - sc-dlp
      - sc-python-ci
      - sc-ts-checks
      - sc-e2e
    if: always()
    steps:
      - name: Evaluate gate
        run: |
          set -e
          RESULTS=(
            "sc-dlp=${{ needs.sc-dlp.result }}"
            "sc-python-ci=${{ needs.sc-python-ci.result }}"
            "sc-ts-checks=${{ needs.sc-ts-checks.result }}"
            "sc-e2e=${{ needs.sc-e2e.result }}"
          )
          echo "## Release Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          FAILED=0
          for r in "${RESULTS[@]}"; do
            NAME="${r%=*}"
            STATUS="${r#*=}"
            echo "| $NAME | $STATUS |" >> $GITHUB_STEP_SUMMARY
            if [ "$STATUS" != "success" ]; then
              FAILED=1
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$FAILED" -eq 0 ]; then
            echo "## PASS - Release gate approved" >> $GITHUB_STEP_SUMMARY
            echo "All SC jobs succeeded."
          else
            echo "## FAIL - Release gate blocked" >> $GITHUB_STEP_SUMMARY
            echo "One or more SC jobs did not pass."
          fi

      - name: Fail if any SC job failed
        if: needs.sc-dlp.result != 'success' || needs.sc-python-ci.result != 'success' || needs.sc-ts-checks.result != 'success' || needs.sc-e2e.result != 'success'
        run: |
          echo "::error::Release gate FAILED - one or more SC jobs did not pass"
          exit 1
