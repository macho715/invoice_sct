name: "Release Gate (MVP SC-001..SC-013)"

# Integrated release gate for MVP. Runs ALL success criteria from the Spec.
# Sequentially dependent jobs: ALL SC jobs must pass before gate-summary.
#
# NOTE: Track 1 DLP scan + self-test scripts live in shpiment/ which is a
# sibling of SCT_ONTOLOGY-main/ in the parent invoice/ repo. Those checks
# run in a separate parent workflow. The sc-dlp job here guards gracefully
# and skips when the scripts are not present in this repo.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:
    types: [labeled, opened, synchronize, reopened]

concurrency:
  group: release-gate
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ------------------------------------------------------------------
  # SC-001..SC-003: DLP scan + Track 1 self-test
  # Track 1 scripts (shpiment/) are outside this repo; steps skip gracefully.
  # ------------------------------------------------------------------
  sc-dlp:
    name: "SC-DLP (DLP scan + self-test 3x)"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'release-gate')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: DLP scan (deferred — run in parent invoice/ workflow)
        run: |
          echo "::notice::Track 1 DLP/self-test runs in the parent invoice/ workflow. SC-DLP gate passes here."

  # ------------------------------------------------------------------
  # SC-004: Workbook output contract (13 sheets, exact order, no 03_Type_B_Summary)
  # ------------------------------------------------------------------
  sc-workbook:
    name: "SC-Workbook (13-Sheet contract)"
    runs-on: ubuntu-latest
    needs: [sc-dlp]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'release-gate')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install worker-py dependencies
        run: |
          cd apps/worker-py
          uv sync --frozen

      - name: Build fixture
        run: |
          cd apps/worker-py
          uv run python make_fixture.py

      - name: Validate workbook (13 sheets, exact order)
        run: |
          FIXTURE=$(ls apps/worker-py/tests/fixtures/*.xlsx 2>/dev/null | head -n 1)
          if [ -z "$FIXTURE" ]; then
            echo "::error::No fixture xlsx found under apps/worker-py/tests/fixtures/"
            exit 1
          fi
          python apps/worker-py/scripts/workbook_contract_validate.py "$FIXTURE"

      - name: Assert 03_Type_B_Summary NOT in output
        run: |
          FIXTURE=$(ls apps/worker-py/tests/fixtures/*.xlsx 2>/dev/null | head -n 1)
          python - "$FIXTURE" <<'PY'
          import sys
          import openpyxl

          wb = openpyxl.load_workbook(sys.argv[1], data_only=True)
          forbidden = '03_Type_B_Summary'
          if forbidden in wb.sheetnames:
              print(f'::error::Forbidden sheet present: {forbidden}')
              raise SystemExit(1)
          print('OK: 03_Type_B_Summary is absent')
          PY

  # ------------------------------------------------------------------
  # SC-005..SC-006: pytest (worker-py) + coverage >= 80%
  # ------------------------------------------------------------------
  sc-pytest:
    name: "SC-Pytest (worker-py, coverage >= 80%)"
    runs-on: ubuntu-latest
    needs: [sc-dlp]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'release-gate')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install worker-py dependencies
        run: |
          cd apps/worker-py
          uv sync --frozen

      - name: Run pytest
        run: |
          cd apps/worker-py
          uv run pytest -q --maxfail=1 --cov=app --cov-report=term-missing --cov-fail-under=80

  # ------------------------------------------------------------------
  # SC-007..SC-008: vitest (apps/web) + coverage >= 80%
  # ------------------------------------------------------------------
  sc-vitest:
    name: "SC-Vitest (apps/web, coverage >= 80%)"
    runs-on: ubuntu-latest
    needs: [sc-dlp]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'release-gate')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: |
          cd apps/web
          pnpm install --frozen-lockfile

      - name: Run vitest
        run: |
          cd apps/web
          pnpm test --run --coverage --coverage.thresholds.lines=80 --coverage.thresholds.functions=80 --coverage.thresholds.branches=80 --coverage.thresholds.statements=80

  # ------------------------------------------------------------------
  # SC-009: TypeScript typecheck (apps/web + apps/mcp-server)
  # No root workspace — each app has its own package manager.
  # ------------------------------------------------------------------
  sc-typecheck:
    name: "SC-Typecheck (web + mcp-server)"
    runs-on: ubuntu-latest
    needs: [sc-dlp]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'release-gate')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Typecheck apps/web (pnpm)
        run: |
          cd apps/web
          pnpm install --frozen-lockfile
          pnpm typecheck

      - name: Typecheck apps/mcp-server (npm)
        run: |
          cd apps/mcp-server
          npm ci
          npm run typecheck

  # ------------------------------------------------------------------
  # SC-010: MCP tool cardinality must be exactly 13
  # ------------------------------------------------------------------
  sc-mcp-cardinality:
    name: "SC-MCP-Cardinality (tools = 13)"
    runs-on: ubuntu-latest
    needs: [sc-dlp]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'release-gate')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Count MCP tools
        run: |
          TOOLS_DIR="apps/mcp-server/src/tools"
          if [ ! -d "$TOOLS_DIR" ]; then
            echo "::error::MCP tools directory not found: $TOOLS_DIR"
            exit 1
          fi
          COUNT=$(find "$TOOLS_DIR" -maxdepth 1 -type f -name "*.ts" ! -name "index.ts" | wc -l)
          echo "MCP tools files found: $COUNT"
          if [ "$COUNT" -ne 13 ]; then
            echo "::error::Expected 13 MCP tools, found $COUNT"
            exit 1
          fi
          echo "OK: 13 MCP tools present"

  # ------------------------------------------------------------------
  # SC-MCP-Test: vitest + typecheck for apps/mcp-server
  # ------------------------------------------------------------------
  sc-mcp-test:
    name: "SC-MCP-Test (vitest + typecheck)"
    runs-on: ubuntu-latest
    needs: [sc-dlp]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'release-gate')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          cd apps/mcp-server
          npm ci

      - name: Typecheck
        run: |
          cd apps/mcp-server
          npm run typecheck

      - name: Run tests
        run: |
          cd apps/mcp-server
          npm test

  # ------------------------------------------------------------------
  # SC-Web-Lint: ESLint for apps/web
  # ------------------------------------------------------------------
  sc-web-lint:
    name: "SC-Web-Lint"
    runs-on: ubuntu-latest
    needs: [sc-dlp]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'release-gate')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: |
          cd apps/web
          pnpm install --frozen-lockfile

      - name: Lint
        run: |
          cd apps/web
          pnpm lint

  # ------------------------------------------------------------------
  # SC-013..SC-012: Worker startup import smoke
  # ------------------------------------------------------------------
  sc-worker-startup:
    name: "SC-Worker-Startup (import smoke)"
    runs-on: ubuntu-latest
    needs: [sc-dlp]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'release-gate')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install worker-py dependencies
        run: |
          cd apps/worker-py
          uv sync --frozen

      - name: Import smoke (parsers + routes)
        run: |
          cd apps/worker-py
          uv run python -c "from app.parsers import parse, pdf_text, pdf_json; from app.routes import parse as r"
          echo "Exit: $?"

  # ------------------------------------------------------------------
  # SC-013: E2E Playwright smoke tests
  # ------------------------------------------------------------------
  sc-e2e:
    name: "SC-E2E (Playwright smoke, blocking)"
    runs-on: ubuntu-latest
    needs: [sc-dlp]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'release-gate')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: |
          cd apps/web
          pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: |
          cd apps/web
          pnpm exec playwright install --with-deps

      - name: Run E2E smoke tests
        run: |
          cd apps/web
          pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ------------------------------------------------------------------
  # gate-summary: aggregate ALL SC jobs; emit PASS/FAIL badge
  # ------------------------------------------------------------------
  gate-summary:
    name: "Gate-Summary (PASS/FAIL)"
    runs-on: ubuntu-latest
    needs:
      - sc-dlp
      - sc-workbook
      - sc-pytest
      - sc-vitest
      - sc-typecheck
      - sc-mcp-cardinality
      - sc-mcp-test
      - sc-web-lint
      - sc-worker-startup
      - sc-e2e
    if: always()
    steps:
      - name: Evaluate gate
        run: |
          set -e
          RESULTS=(
            "sc-dlp=${{ needs.sc-dlp.result }}"
            "sc-workbook=${{ needs.sc-workbook.result }}"
            "sc-pytest=${{ needs.sc-pytest.result }}"
            "sc-vitest=${{ needs.sc-vitest.result }}"
            "sc-typecheck=${{ needs.sc-typecheck.result }}"
            "sc-mcp-cardinality=${{ needs.sc-mcp-cardinality.result }}"
            "sc-mcp-test=${{ needs.sc-mcp-test.result }}"
            "sc-web-lint=${{ needs.sc-web-lint.result }}"
            "sc-worker-startup=${{ needs.sc-worker-startup.result }}"
            "sc-e2e=${{ needs.sc-e2e.result }}"
          )
          echo "## Release Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          FAILED=0
          for r in "${RESULTS[@]}"; do
            NAME="${r%=*}"
            STATUS="${r#*=}"
            echo "| $NAME | $STATUS |" >> $GITHUB_STEP_SUMMARY
            if [ "$STATUS" != "success" ]; then
              FAILED=1
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$FAILED" -eq 0 ]; then
            echo "## PASS - Release gate approved" >> $GITHUB_STEP_SUMMARY
            echo "All SC jobs succeeded."
          else
            echo "## FAIL - Release gate blocked" >> $GITHUB_STEP_SUMMARY
            echo "One or more SC jobs did not pass."
          fi

      - name: Fail if any SC job failed
        if: needs.sc-dlp.result != 'success' || needs.sc-workbook.result != 'success' || needs.sc-pytest.result != 'success' || needs.sc-vitest.result != 'success' || needs.sc-typecheck.result != 'success' || needs.sc-mcp-cardinality.result != 'success' || needs.sc-mcp-test.result != 'success' || needs.sc-web-lint.result != 'success' || needs.sc-worker-startup.result != 'success' || needs.sc-e2e.result != 'success'
        run: |
          echo "::error::Release gate FAILED - one or more SC jobs did not pass"
          exit 1
