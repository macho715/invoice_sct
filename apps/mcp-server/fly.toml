# fly.toml app configuration file generated for hvdc-mcp-server on 2026-06-14T02:54:58+04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hvdc-mcp-server'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
