[extend]
useDefault = true

# Gitleaks configuration for SCT_ONTOLOGY
# Detects hardcoded secrets, keys, tokens in the codebase.

title = "SCT_ONTOLOGY Gitleaks Config"

[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(?:key|api|token|secret|password|auth)[\s]*[=:][\s]*['\"][A-Za-z0-9+/=_\-]{20,}['\"]'''

[[rules]]
id = "private-key"
description = "Private Key"
regex = '''-----BEGIN\s.*PRIVATE\sKEY-----'''

[allowlist]
description = "Test fixtures and known-safe patterns"
paths = [
  '''(.*?)(test|spec|fixture|mock)(.*?)''',
  "pnpm-lock.yaml",
  ".git/",
]
regexes = [
  '''test-mcp-key''',
  '''e2e-test-key''',
  '''change-me-in-production''',
]
